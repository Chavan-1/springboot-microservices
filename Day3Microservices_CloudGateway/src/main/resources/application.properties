spring.application.name=API-GATEWAY

# ===== Server Port (Optional) =====
server.port=9090

# Order Service
spring.cloud.gateway.server.webmvc.routes[0].id=ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates=Path=/order/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=ORDER-SERVICE,forward:/orderServiceFallback

# Product Service
spring.cloud.gateway.server.webmvc.routes[1].id=PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates=Path=/product/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=CircuitBreaker=PRODUCT-SERVICE,forward:/productServiceFallback

# Payment Service
spring.cloud.gateway.server.webmvc.routes[2].id=PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/payment/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=PAYMENT-SERVICE,forward:/paymentServiceFallback

#===== Eureka client config ======
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

